name: Frontend PR Checks

on:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout requested ref
        if: ${{ inputs.checkout_ref != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Checkout repository
        if: ${{ inputs.checkout_ref == '' }}
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier
        run: npm run format

      - name: Fail on formatting changes
        run: git diff --exit-code -- .
