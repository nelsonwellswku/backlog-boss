name: Backend PR Tests

on:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to checkout when invoked as a reusable workflow"
        required: false
        type: string

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout requested ref
        if: ${{ inputs.checkout_ref != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Checkout repository
        if: ${{ inputs.checkout_ref == '' }}
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: backend/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install SQL Server ODBC driver
        run: |
          curl -fsSL -O "https://packages.microsoft.com/config/ubuntu/$(. /etc/os-release && echo "${VERSION_ID}")/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          rm packages-microsoft-prod.deb
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
