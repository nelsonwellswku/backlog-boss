name: Publish Container Image

on:
  workflow_dispatch:
    inputs:
      ref_type:
        description: "Publish from a branch or a tag"
        required: true
        type: choice
        default: branch
        options:
          - branch
          - tag
      ref_name:
        description: "Branch name or tag name to publish"
        required: true
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout branch
        if: ${{ inputs.ref_type == 'branch' }}
        uses: actions/checkout@v6
        with:
          ref: refs/heads/${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Checkout tag
        if: ${{ inputs.ref_type == 'tag' }}
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ inputs.ref_name }}
          fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image
        run: |
          REF_TYPE="${{ inputs.ref_type }}"
          REF_NAME="${{ inputs.ref_name }}"

          case "${REF_TYPE}" in
            branch)
              IMAGE_TAG="latest-untagged"
              ;;
            tag)
              IMAGE_TAG="${REF_NAME}"
              ;;
            *)
              echo "Error: unsupported ref type '${REF_TYPE}'." >&2
              exit 1
              ;;
          esac

          if [[ ! "$IMAGE_TAG" =~ ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,127}$ ]]; then
            echo "Error: image tag '${IMAGE_TAG}' is not a valid Docker tag. Must start with a letter or number, contain only letters, numbers, underscores, periods, or hyphens, and be 128 characters or fewer." >&2
            exit 1
          fi

          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image.outputs.tag }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
